<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DeClutter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="brand">
        <div class="brand-mark">
          <img src="icon.png" alt="" width="36" height="36" />
        </div>
        <div class="brand-text">
          <h1>DeClutter</h1>
          <p>From Tab Chaos to Clarity</p>
        </div>
        <!-- <button id="library-btn" class="c" title="Summary Library" aria-label="Open Summary Library">
          &#9776;
        </button> -->
      </header>

      <section class="tab-strip" id="current-tab">
        <span class="tab-icon">&#9782;</span>
        <span class="tab-title" id="tab-title">Loading tab...</span>
      </section>

      <section class="length-row">
        <span class="length-label">Length</span>
        <div class="segmented" role="radiogroup" aria-label="Summary length">
          <button class="seg" data-length="short" role="radio" aria-checked="false">Short</button>
          <button class="seg is-active" data-length="medium" role="radio" aria-checked="true">Medium</button>
          <button class="seg" data-length="long" role="radio" aria-checked="false">Long</button>
        </div>
      </section>

      <button id="summarize-current" class="btn-primary">
        <span class="bolt">&#9889;</span> Summarize this tab
      </button>
      <button id="summarize-all" class="btn-secondary">
        <span class="bolt">&#9889;</span> Summarize all tabs
      </button>

    </main>

    <script src="popup.js"></script>
  </body>
</html>
