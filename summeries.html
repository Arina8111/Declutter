<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Summary Library — DeClutter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="library-page">
    <main class="library-wrap">
      <header class="brand library-brand">
        <div class="brand-mark">
          <img src="icon.png" alt="" width="36" height="36" />
        </div>
        <h1>Summary Library</h1>
        <button id="clear-btn" class="btn-ghost" title="Clear all summaries">Clear all</button>
      </header>

      <section id="empty" class="empty" hidden>
        <h3>Summery heading</h3>
        <p>Summery Content</p>
      </section>

      <section id="list" class="list"></section>
    </main>
  </body>
</html>
