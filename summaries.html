<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Summary Library — DeClutter</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="library-page">
    <main class="library-wrap">
      <header class="brand library-brand">
        <div class="brand-mark">
          <img src="icon.png" alt="" width="36" height="36" />
        </div>
        <h1>Summary Library</h1>
        <button id="clear-btn" class="btn-ghost" title="Clear all summaries">Clear all</button>
      </header>
      <section id="list" class="list">
        <div class="d-flex align-items-center" id="loading">
          <strong role="status">Genrating Summeries...</strong>
          <div class="spinner-border ms-auto" aria-hidden="true"></div>
        </div>
        <div>
          <a href="http://" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>
      </section>
    </main>
    <script src="summary.js"></script>
  </body>
</html>
